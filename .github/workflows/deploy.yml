name: Producion Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/psychoclub
            git fetch origin main
            git reset --hard origin/main
            
            # Clean up restricted env variables from server's .env to prevent Vite build conflicts
            [ -f .env ] && sed -i '/NODE_ENV/d' .env || true
            
            npm install
            npx prisma generate
            export NODE_OPTIONS=--max-old-space-size=2048
            npm run build
            
            # Use ecosystem config for reliability
            pm2 delete all || true
            pm2 start ecosystem.config.cjs --env production
            pm2 save
