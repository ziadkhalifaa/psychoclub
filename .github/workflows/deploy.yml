name: Producion Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/psychoclub
            git fetch origin main
            git reset --hard origin/main
            npm install
            npx prisma generate
            export NODE_OPTIONS=--max-old-space-size=2048
            npm run build
            
            # Consolidate into a single process for reliability
            # Stop the redundant 'psychoclub' process if it exists
            pm2 stop psychoclub || true
            pm2 delete psychoclub || true
            
            # Restart or Start the main API process which serves the frontend on 3000
            pm2 restart psychoclub-api || pm2 start server.ts --name psychoclub-api
            pm2 save
