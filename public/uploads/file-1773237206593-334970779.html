<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مقياس القلق</title>
<style>
body{
    font-family: Arial;
    direction: rtl;
    text-align: right;
    background:#f4f6f9;
    padding:20px;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:600px;
    margin:auto;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

.question{
    margin:15px 0;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h2>مقياس القلق</h2>

<p>اختر الإجابة المناسبة لك خلال الأسبوعين الماضيين:</p>

<div class="question">
<p>1. أشعر بالتوتر أو العصبية.</p>
<label><input type="radio" name="q1" value="0"> أبداً</label><br>
<label><input type="radio" name="q1" value="1"> أحياناً</label><br>
<label><input type="radio" name="q1" value="2"> غالباً</label><br>
<label><input type="radio" name="q1" value="3"> دائماً</label>
</div>

<div class="question">
<p>2. أجد صعوبة في الاسترخاء.</p>
<label><input type="radio" name="q2" value="0"> أبداً</label><br>
<label><input type="radio" name="q2" value="1"> أحياناً</label><br>
<label><input type="radio" name="q2" value="2"> غالباً</label><br>
<label><input type="radio" name="q2" value="3"> دائماً</label>
</div>

<div class="question">
<p>3. أفكر كثيراً في أشياء تقلقني.</p>
<label><input type="radio" name="q3" value="0"> أبداً</label><br>
<label><input type="radio" name="q3" value="1"> أحياناً</label><br>
<label><input type="radio" name="q3" value="2"> غالباً</label><br>
<label><input type="radio" name="q3" value="3"> دائماً</label>
</div>

<button onclick="calculate()">عرض النتيجة</button>

<div class="result" id="result"></div>

</div>

<script>

function calculate(){

let score = 0;

for(let i=1;i<=3;i++){
let q = document.querySelector('input[name="q'+i+'"]:checked');
if(q){
score += parseInt(q.value);
}
}

let resultText = "";

if(score <= 2){
resultText = "مستوى القلق منخفض 😊";
}
else if(score <=5){
resultText = "مستوى القلق متوسط ⚠️";
}
else{
resultText = "مستوى القلق مرتفع ويفضل استشارة مختص.";
}

document.getElementById("result").innerText = "النتيجة: " + resultText;

}

</script>

</body>
</html>
